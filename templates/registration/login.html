{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion - Dashboard</title>
    {% load static %}
    <style>
       body { 
            background-image: url("{% static 'images/90419.png' %}");
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; /* Centra la tarjeta en la pantalla */
        }
        
        .login-card { 
            background-color: #111827; 
            border: 1px solid #1e293b; 
            border-radius: 12px; 
            padding: 40px; 
            width: 100%; 
            max-width: 380px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }

        .login-header { 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .login-header h1 { 
            margin: 0; 
            font-size: 28px; 
            color: #f0f0f0; 
        }

        .login-header p { 
            color: #9ca3af; 
            font-size: 14px; 
            margin-top: 5px; 
        }

        .form-group { 
            margin-bottom: 20px; 
        }

        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 13px; 
            color: #f5f6f8; 
        }

        .form-group input { 
            width: 100%; 
            padding: 12px; 
            background-color: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 6px; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s; 
        }

        .form-group input:focus { 
            border-color: #0ea5e9; 
        }

        .btn-submit { 
            width: 100%; 
            background-color: #0ea5e9; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 6px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            margin-top: 10px; 
        }

        .btn-submit:hover { 
            background-color: #0284c7; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1><i class="fa-solid fa-chart-line"></i> Acceso Ejecutivo</h1>
            <p>Ingresa tus credenciales para acceder al sistema de inteligencia comercial</p>
        </div>

        <form action="{% url 'inicio' %}" method="get">
            
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> Usuario</label>
                <input type="text" name="username" placeholder="Tu usuario" required>
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Tu contraseña" required>
            </div>
            
            <button type="submit" class="btn-submit">Entrar al panel</button>

        </form>
    </div>

</body>
</html>
