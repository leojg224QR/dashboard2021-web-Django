{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion - Dashboard</title>
    <style>
        body {
            /* Usa la tag de Django para static */
            background-image: url("{% static 'images/90419.png' %}");
            background-color: rgba(0, 0, 0, 0.5);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            min-height: 100vh;
        }
        
        .login {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: rgba(0, 0, 0, 0.3); /* Oscurecer un poco */
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        .login-card h2 {
            margin-top: 0;
            color: #1f2937;
            text-align: center;
        }
        
        .login-card p {
            margin-top: 0;
            color: #6b7280;
            text-align: center;
        }
        
        .login-card button {
            width: 100%;
            padding: 10px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .login-card button:hover {
            background: #374151;
        }
        
        .login-card input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <section class="login">
        <div class="login-card">
            <h2>Acceso del Ejecutivo</h2>
            <p>Ingrese sus credenciales para acceder al sistema</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Entrar</button>
            </form>
        </div>
    </section>
</body>
</html>
